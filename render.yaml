services:
  # Backend Service
  - type: web
    name: biztrack-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: ./data/biztrack.db
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health

  # Frontend Service
  - type: web
    name: biztrack-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
